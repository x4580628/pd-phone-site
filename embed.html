<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PD通訊 | 收購價嵌入版</title>
    <link rel="stylesheet" href="embed.css">
  </head>
  <body>
    <main class="embed-shell">
      <section class="market-panel" id="price-table">
        <div class="category-tabs" data-category-tabs="used"></div>

        <div class="market-card">
          <div class="market-heading">
            <p class="eyebrow" data-market-label>iPhone 手機</p>
            <h1 data-market-title>今日iPhone收購價</h1>
            <p data-market-subtitle>依系列與容量快速查詢收購行情，實際價格以現場檢測為準。</p>
            <span class="updated-date" data-updated="used"></span>
          </div>

          <div class="series-tabs" data-table-tabs="used"></div>

          <div class="table-wrap">
            <table class="price-table matrix-table">
              <thead></thead>
              <tbody data-price-table="used"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="price-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
